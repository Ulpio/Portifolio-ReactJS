<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0d1117"/>
  <rect x="0" y="0" width="1200" height="4" fill="#58a6ff"/>

  <!-- Grid background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(48,54,61,0.3)" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="fade" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="gridMask">
      <rect width="1200" height="630" fill="url(#fade)"/>
    </mask>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" mask="url(#gridMask)"/>

  <!-- Name -->
  <text x="100" y="260" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="700" fill="#e6edf3">Ulpio Netto</text>

  <!-- Role -->
  <text x="100" y="320" font-family="monospace" font-size="28" font-weight="500" fill="#58a6ff">Backend Developer · Go &amp; Java</text>

  <!-- Stack badges -->
  <text x="100" y="390" font-family="monospace" font-size="18" fill="#8b949e">Go · Java · PostgreSQL · Kubernetes · AWS · Docker · Terraform</text>

  <!-- Green dot + status -->
  <circle cx="112" cy="440" r="6" fill="#39d353"/>
  <text x="128" y="445" font-family="monospace" font-size="16" fill="#39d353">Open to opportunities</text>

  <!-- URL -->
  <text x="100" y="540" font-family="monospace" font-size="16" fill="#30363d">ulpionetto.dev</text>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="#58a6ff"/>
</svg>
